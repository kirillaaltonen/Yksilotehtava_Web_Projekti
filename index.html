<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opiskelijaravintolat</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" defer></script>
</head>
<body>

<header>
  <h1>Opiskelijaravintolat</h1>
  <p>Suomen opiskelijaravintolat ja ruokalistat</p>
</header>

<main>
  <section>
    <h2>Hakutoiminnot</h2>

    <input id="searchInput" type="search" placeholder="Hae ravintolaa...">

    <select id="cityFilter">
      <option value="all">Kaikki kaupungit</option>
    </select>

    <select id="providerFilter">
      <option value="all">Kaikki tarjoajat</option>
    </select>
  </section>

  <section>
    <h2>Ravintolat</h2>
    <p id="message">Ladataan ravintoloita...</p>
    <div id="restaurantList"></div>
  </section>

  <section>
    <h2>Ruokalista</h2>
    <p id="selectedRestaurantName">Valitse ravintola</p>

    <button id="dailyButton" disabled>Päivän menu</button>
    <button id="weeklyButton" disabled>Viikon menu</button>

    <div id="menuContent"></div>
  </section>
</main>

  <section>
    <h2>Ruokalista</h2>
    <p id="selectedRestaurantName">Valitse ravintola</p>

    <button id="dailyButton" disabled>Päivän menu</button>
    <button id="weeklyButton" disabled>Viikon menu</button>

    <div id="menuContent"></div>
  </section>
</main>
</body>
</html>
